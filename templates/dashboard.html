<!DOCTYPE html>
<html>
<head>

<title>PhishGuard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>

  :root {
    --bg-deep:    #020c18;
    --bg-panel:   #061628;
    --bg-card:    #0a2040;
    --border:     #0e4070;
    --accent:     #00c3ff;
    --accent2:    #00ff99;
    --danger:     #ff3a5c;
    --safe:       #00ff99;
    --text:       #cde8ff;
    --muted:      #4a7fa8;
    --font-mono:  'Share Tech Mono', monospace;
    --font-ui:    'Rajdhani', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID BACKGROUND ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,195,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,195,255,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── SCANLINE OVERLAY ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.15) 2px,
      rgba(0,0,0,.15) 4px
    );
    pointer-events: none;
    z-index: 0;
    opacity: .4;
  }

  /* ── LAYOUT ── */
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    gap: 18px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 52px; height: 52px;
    flex-shrink: 0;
  }

  .header-text { text-align: left; }

  .header-text h1 {
    font-family: var(--font-ui);
    font-size: 1.7rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #fff;
    line-height: 1.1;
  }

  .header-text h1 span { color: var(--accent); }

  .header-sub {
    font-family: var(--font-mono);
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .2em;
    margin-top: 4px;
  }

  .header-status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: .75rem;
    color: var(--accent2);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: .3; }
  }

  /* ── SCAN PANEL ── */
  .scan-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px 32px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .scan-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .scan-label {
    font-family: var(--font-mono);
    font-size: .65rem;
    letter-spacing: .25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .scan-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  #urlInput {
    flex: 1;
    background: var(--bg-deep);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: .9rem;
    padding: 12px 16px;
    outline: none;
    transition: border-color .2s;
    width: auto;
  }

  #urlInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,195,255,.12);
  }

  #urlInput::placeholder { color: var(--muted); }

  button {
    background: var(--accent);
    color: #020c18;
    border: none;
    border-radius: 5px;
    font-family: var(--font-ui);
    font-weight: 700;
    font-size: .9rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 12px 30px;
    cursor: pointer;
    transition: background .2s, box-shadow .2s;
  }

  button:hover {
    background: #33d4ff;
    box-shadow: 0 0 20px rgba(0,195,255,.4);
  }

  /* ── RESULT ROW ── */
  .result-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-top: 20px;
  }

  .result-card {
    background: var(--bg-deep);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 18px;
  }

  .result-card .rc-label {
    font-family: var(--font-mono);
    font-size: .6rem;
    letter-spacing: .22em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .result-card .rc-value {
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
    min-height: 22px;
  }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-box {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .stat-box::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: .3;
  }

  .stat-box.danger::after { background: var(--danger); opacity: .5; }
  .stat-box.safe::after   { background: var(--safe);   opacity: .5; }

  .stat-num {
    font-family: var(--font-mono);
    font-size: 2.4rem;
    font-weight: 400;
    color: var(--accent);
    line-height: 1;
  }

  .stat-box.danger .stat-num { color: var(--danger); }
  .stat-box.safe   .stat-num { color: var(--safe); }

  .stat-lbl {
    font-size: .75rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ── MAIN GRID ── */
  .main-grid {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 20px;
    margin-bottom: 28px;
    align-items: start;
  }

  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .panel-title {
    font-family: var(--font-mono);
    font-size: .65rem;
    letter-spacing: .25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }

  /* ── CHART ── */
  #chart { width: 100% !important; }

  /* ── THREAT LOGS TABLE ── */
  .logs-panel { background: var(--bg-panel); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: .88rem;
    margin: 0;
  }

  thead tr {
    border-bottom: 1px solid var(--border);
  }

  th {
    font-family: var(--font-mono);
    font-size: .6rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 14px;
    text-align: left;
    border: none;
  }

  td {
    padding: 11px 14px;
    border: none;
    border-bottom: 1px solid rgba(14,64,112,.5);
    font-family: var(--font-mono);
    font-size: .78rem;
    color: var(--text);
  }

  tbody tr:hover { background: rgba(0,195,255,.04); }

  tbody tr:last-child td { border-bottom: none; }

  /* result badge colors applied via JS */
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 3px;
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
  }

  .badge-phish {
    background: rgba(255,58,92,.15);
    color: var(--danger);
    border: 1px solid rgba(255,58,92,.3);
  }

  .badge-legit {
    background: rgba(0,255,153,.1);
    color: var(--safe);
    border: 1px solid rgba(0,255,153,.25);
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    font-family: var(--font-mono);
    font-size: .6rem;
    color: var(--muted);
    letter-spacing: .18em;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  /* ── RESPONSIVE ── */
  @media(max-width: 768px) {
    .main-grid    { grid-template-columns: 1fr; }
    .stats-row    { grid-template-columns: 1fr 1fr; }
    .result-row   { grid-template-columns: 1fr; }
    .scan-row     { flex-direction: column; }
    #urlInput     { width: 100%; }
  }

</style>
</head>

<body>
<div class="wrapper">

  <!-- HEADER -->
  <header>
    <svg class="logo-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="25" stroke="#00c3ff" stroke-width="1.5" opacity=".4"/>
      <circle cx="26" cy="26" r="18" stroke="#00c3ff" stroke-width="1" opacity=".6"/>
      <path d="M26 10 L26 16 M26 36 L26 42 M10 26 L16 26 M36 26 L42 26" stroke="#00c3ff" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M20 20 L26 14 L32 20 L38 26 L32 32 L26 38 L20 32 L14 26 Z" stroke="#00c3ff" stroke-width="1.2" fill="none"/>
      <circle cx="26" cy="26" r="4" fill="#00c3ff" opacity=".8"/>
      <circle cx="26" cy="26" r="2" fill="#fff"/>
    </svg>
    <div class="header-text">
      <h1><span>Phish</span>Guard</h1>
      <div class="header-sub">SOC DASHBOARD · THREAT INTELLIGENCE PLATFORM</div>
    </div>
    <div class="header-status">
      <div class="dot"></div>
      SYSTEM ONLINE
    </div>
  </header>

  <!-- SCAN PANEL -->
  <div class="scan-panel">
    <div class="scan-label">// URL THREAT SCANNER</div>
    <div class="scan-row">
      <input id="urlInput" type="text" placeholder="https://example.com/suspicious-path">
      <button onclick="scan()">&#9654; SCAN</button>
    </div>
    <div class="result-row">
      <div class="result-card">
        <div class="rc-label">Detection Result</div>
        <div class="rc-value" id="result">—</div>
      </div>
      <div class="result-card">
        <div class="rc-label">Threat Intel</div>
        <div class="rc-value" id="intel">—</div>
      </div>
      <div class="result-card">
        <div class="rc-label">SOAR Action</div>
        <div class="rc-value" id="action">—</div>
      </div>
    </div>
  </div>

  <!-- STATS ROW -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num" id="total">0</div>
      <div class="stat-lbl">Total Scans</div>
    </div>
    <div class="stat-box safe">
      <div class="stat-num" id="legit">0</div>
      <div class="stat-lbl">Legitimate</div>
    </div>
    <div class="stat-box danger">
      <div class="stat-num" id="phish">0</div>
      <div class="stat-lbl">Phishing Detected</div>
    </div>
  </div>

  <!-- CHART + LOGS -->
  <div class="main-grid">

    <div class="panel">
      <div class="panel-title">Detection Overview</div>
      <canvas id="chart"></canvas>
    </div>

    <div class="panel logs-panel">
      <div class="panel-title">Threat Logs</div>
      <table>
        <thead>
          <tr>
            <th>URL</th>
            <th>Result</th>
            <th>Action</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody id="logs"></tbody>
      </table>
    </div>

  </div>

  <footer>ANTHROPIC · AI-POWERED THREAT DETECTION · CONFIDENTIAL</footer>

</div><!-- /wrapper -->

<!-- ═══════════════════════════════════════════════
     ALL ORIGINAL SCRIPT LOGIC — UNCHANGED
═══════════════════════════════════════════════ -->
<script>

let total = 0
let phishing = 0

const ctx = document.getElementById("chart")

const chart = new Chart(ctx,{
  type:"bar",
  data:{
    labels:["Legitimate","Phishing"],
    datasets:[{
      label:"Detection",
      data:[0,0],
      backgroundColor: ["rgba(0,255,153,.25)", "rgba(255,58,92,.25)"],
      borderColor:     ["#00ff99",             "#ff3a5c"],
      borderWidth: 1.5,
      borderRadius: 4,
    }]
  },
  options:{
    plugins:{
      legend:{ labels:{ color:"#4a7fa8", font:{ family:"'Share Tech Mono', monospace", size:11 } } }
    },
    scales:{
      x:{ ticks:{ color:"#4a7fa8", font:{ family:"'Share Tech Mono', monospace" } }, grid:{ color:"rgba(14,64,112,.6)" } },
      y:{ ticks:{ color:"#4a7fa8", font:{ family:"'Share Tech Mono', monospace" } }, grid:{ color:"rgba(14,64,112,.6)" }, beginAtZero:true }
    }
  }
})

function scan(){

  let url = document.getElementById("urlInput").value

  if(!url){
    alert("Please enter a URL")
    return
  }

  fetch("/scan",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({url:url})
  })

  .then(res=>res.json())

  .then(data=>{

    document.getElementById("result").innerText = data.result
    document.getElementById("intel").innerText = data.intel
    document.getElementById("action").innerText = data.action

    total++

    if(data.result=="Phishing"){
      phishing++
    }

    document.getElementById("total").innerText = total
    document.getElementById("phish").innerText = phishing
    document.getElementById("legit").innerText = total - phishing

    chart.data.datasets[0].data=[total-phishing,phishing]
    chart.update()

    loadLogs()

  })

  .catch(error=>{
    console.log(error)
    alert("Error scanning URL")
  })

}

function loadLogs(){

  fetch("/logs")

  .then(res=>res.json())

  .then(data=>{

    let table=""

    data.forEach(log=>{

      const badgeClass = log.result === "Phishing" ? "badge-phish" : "badge-legit"

      table+=`
        <tr>
          <td>${log.url}</td>
          <td><span class="badge ${badgeClass}">${log.result}</span></td>
          <td>${log.action}</td>
          <td>${log.time}</td>
        </tr>
      `

    })

    document.getElementById("logs").innerHTML = table

  })

}

loadLogs()

</script>

</body>
</html>
